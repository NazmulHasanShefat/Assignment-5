<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="./css/index.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Github-Issue-Tracker</title>
</head>

<body class="body-bg">
    <header class="w-full">
        <div class="flex flex-col lg:flex-row md:flex-row sm:flex-row px-5 py-2 bg-base-100 shadow-sm">
            <div class="flex-1 items-center flex justify-center md:justify-start lg:justify-start">
                <a class="lg:text-xl flex gap-3 items-center py-3 md:py-0 lg:py-0 text-md cursor-pointer">
                    <span><img src="./assets/github-logo.png" width="30px" height="30px" alt=""></span>
                    GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2">
                <input type="text" id="issues_search_input" placeholder="Search" class="px-3 rounded-md py-1 border-2 border-gray-200 max-w-50" />
                <button type="button" class="btn bg-blue-600 text-white px-3 py-1 cursor-pointer hover:opacity-70" id="search_btn">Search</button>
            </div>
        </div>
    </header>

    <main class="max-w-[1110px] mx-auto">
        <div class="filter_navigation_container rounded-md flex justify-start items-center gap-3 mt-5 py-2 border-gray-200 bg-white px-5 lg:px-0">
            <button type="button" class="active_btn filter_btn outline-0 hover:opacity-75 border border-slate-400 cursor-pointer text-slate-500 lg:min-w-[100px] min-w-[50px] px-3 py-1 rounded-lg" data-filter="all">All</button>
            <button type="button" class="outline-0 filter_btn border hover:opacity-75 border-slate-400 cursor-pointer text-slate-500 lg:min-w-[100px] min-w-[50px] px-3 py-1 rounded-lg" data-filter="open">Open</button>
            <button type="button" class="outline-0 filter_btn border hover:opacity-75 border-slate-400 cursor-pointer text-slate-500 lg:min-w-[100px] min-w-[50px] px-3 py-1 rounded-lg" data-filter="closed">Closed</button>
        </div>

        <div
            class="issus_status lg:flex justify-between items-center w-full p-2 px-4 bg-white mt-2 rounded-md border-gray-200">
            <div class="left flex justify-start items-center gap-3">
                <div class="bg-[#ECE4FF] p-1 rounded-full"><img src="./assets/Aperture.png" alt=""></div>
                <div class="status_text h-max">
                    <h2 class="font-semibold text-[20px]"><span id="dis_total_issues">_</span>issues</h2>
                    <p class="text-gray-400 lg:text-[16px] text-[12px]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="right flex lg:justify-center mt-3 lg:mt-0 px-3 lg:px-0 items-center gap-5">
                <div class="open_indicator flex gap-2 items-center">
                    <div class="w-[15px] h-[15px] rounded-full bg-[#A855F7]"></div>
                    <p class="font-medium text-[16px]">Closed</p>
                </div>
                <div class="open_indicator flex gap-2 items-center">
                    <div class="w-[15px] h-[15px] rounded-full bg-[#00A96E]"></div>
                    <p class="font-medium text-[16px]">Open</p>
                </div>
            </div>
        </div>
        <div id="issues_cards_container" class="main_content min-h-64 bg-white mt-2 p-3 rounded-md border-gray-200 grid justify-self-center gap-5 lg:grid-cols-4 md:grid-cols-3 sm:grid-cols-2">
            <!-- issues cards -->
        </div>
    </main>

    <script src="./js/dashBord.js"></script>
</body>

</html>
