<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./css/index.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Github-Issue-Tracker</title>
</head>

<body class="body-bg">
    <div class="login_page_container w-full flex justify-center items-center min-h-screen">
        <div class="login_card w-[95%] lg:w-[520px] shadow-md shadow-gray-200 p-8 bg-white">
            <div class="card_logo flex justify-center items-center"><img src="./assets/github-logo.png" alt=""></div>
            <h1 class="card_title text-center font-bold text-[24px]">Github-Issue-Tracker</h1>
            <p class="text-slate-500 text-center">Sign in to manage your issues</p>

            <form class="pt-5" id="loginForm">
                <div class="input_fuild py-1">
                    <label for="userName" class="font-medium text-[16px]">Username</label>
                    <input type="text" placeholder="Enter Username" id="userName"
                        class="border border-[#64748b69] p-2 px-3 block outline-0 rounded-md focus:border-blue-600 w-full text-[16px]">
                    <p class="input_messsage text-blue-400">Default: admin</p>
                </div>
                <div class="input_fuild py-1">
                    <label for="password" class="font-medium text-[16px]">Password</label>
                    <input type="password" placeholder="Enter Username" id="pwd"
                        class="border border-[#64748b60] p-2 px-3 block outline-0 rounded-md focus:border-blue-600 w-full text-[16px]">
                    <p class="input_messsage text-blue-400">Default: admin123</p>
                </div>
                <button type="submit" id="submit_btn"
                    class="text-white w-full bg-blue-500 py-2 cursor-pointer rounded-md active:scale-95">Sign
                    in</button>

                <div class="divider">OR</div>

                <p class="text-slate-500 text-center">Demo Credentials:</p>
                <p class="text-center"><strong>UserName: </strong>admin</p>
                <p class="text-center"><strong>Password: </strong>admin123</p>
            </form>
        </div>
    </div>

    <script src="./js/login.js"></script>
</body>

</html>
